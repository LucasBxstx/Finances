version: '3.8'
services:
  frontend:
    container_name: finances-web-app
    build:
      context: ./FinancesWebApp
      dockerfile: Dockerfile
    ports:
      - "8080:80" # Frontend verfügbar unter http://localhost:8080

  backend:
    container_name: finances-api
    build:
      context: ./FinancesAPI/FinancesBackend
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=FinanceDB;User Id=sa;Password=Medium3;
    depends_on:
      - sqlserver
    ports:
      - "5000:80" # Backend verfügbar unter http://localhost:5000

  sqlserver:
    container_name: finances-sql-server
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: Medium3
      MSSQL_PID: Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

volumes:
  sqlserver_data:
