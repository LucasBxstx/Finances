<div *transloco="let t; read: 'login'" class="container">
    <div class="title">{{t("myFinances")}}</div>

    <div class="center">
        <span *ngIf="!showError">{{t("login")}}</span>
        <span *ngIf="showError" class="red">{{t("error")}}</span>
    </div>

    <input type="text" [formControl]="emailFormControl" [placeholder]="t('email')">
    <div class="password-container">
        <input [type]="showPassword ? 'text' : 'password'" (keyup.enter)="login()" [formControl]="passwordFormControl" [placeholder]="t('password')">
        <div (click)="showPassword = !showPassword" class="show-password">
            <img [src]="showPassword ?'assets/icons/eye-crossed.svg' : 'assets/icons/eye.svg'">
        </div>
    </div>
   

    <button class="space" (click)="login()" [disabled]="emailFormControl.invalid || passwordFormControl.invalid || showSpinner">
        <span *ngIf="!showSpinner">{{t('loginButton')}}</span>
        <app-spinner *ngIf="showSpinner" class="spinner"></app-spinner>
    </button>
    <button (click)="createAccount()">{{t('createAccount')}}</button>
</div>

<app-footer></app-footer>
