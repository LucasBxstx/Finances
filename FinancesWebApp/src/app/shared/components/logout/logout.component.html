<div class="container" (mouseleave)="menuOpened = false">

    <div class="circle" (mouseenter)="menuOpened = true"></div>
    <div *ngIf="menuOpened"  class="menu">
        <span *ngIf="emailAddress" class="email">{{emailAddress}}</span>
        <button (click)="logout()">Logout</button>
    </div>

</div>
