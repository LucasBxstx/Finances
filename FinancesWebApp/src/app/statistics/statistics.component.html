<div class="heading">My Finances</div>

<div class="division"></div>

<div class="navbar">
    <div class="selector" (click)="navigateTo('transactions')">Transactions</div>
    <div class="selector" [ngClass]="'selected'" (click)="navigateTo('statistics')">Statistics</div>
</div>

<div class="division space"></div>

<app-drop-menu class="year" [description]="'Year'" [currentValue]="selectedYear$ | async"
    [valueList]="availableYears$ |async" (valueChanged)="changeYear($event)"></app-drop-menu>

<app-drop-menu [translateMonth]="true" [currentValue]="selectedMonth$ | async" [valueList]="availableMonths$ |async"
    (valueChanged)="changeMonth($event)"></app-drop-menu>

<app-interactive-table-chart [allMonthCategoryData]="categoryDataOfSelectedYearGroupedByMonth$ | async"></app-interactive-table-chart>

<app-drop-menu class="pie-chart-drop-down-start-month" [description]="'Start month'" [translateMonth]="true" [currentValue]="pieChartSelectedStartMonth$ | async" 
    [valueList]="availableMonths$ | async" (valueChanged)="changePieChartSelectedStartMonth($event)"></app-drop-menu>

<div class="row">
    <app-chart [chartOptions]="labelSharePrice$ |async"></app-chart>
    <app-chart [chartOptions]="labelShareCount$ |async"></app-chart>
</div>
