<div *transloco="let t read 'statistics'">
    <div class="heading">{{t('heading')}}</div>

    <app-logout></app-logout>

    <div class="division"></div>

    <div *transloco="let t read 'navbar'" class="navbar">
        <div class="selector" (click)="navigateTo('transactions')">{{t('transactions')}}</div>
        <div class="selector" [ngClass]="'selected'" (click)="navigateTo('statistics')">{{t('statistics')}}</div>
    </div>

    <div class="division space"></div>

    <div [ngClass]="{invisible: (showSpinner$ |async) === true}">
        <div *ngIf="!showLoadingError">
            <app-chart [chartOptions]="accountBalanceTimeData$ | async" [title]="t('accountBalanceChartTitle')" [errorMessage]="t('expensesError')" class="account-balance-time-chart"></app-chart>

            <app-chart [chartOptions]="expensesLabelStackTimeData$ | async" [title]="t('yearlyLabelsStackChartTitle')" [errorMessage]="t('expensesError')"></app-chart>

            <app-chart [chartOptions]="yearlyColumnChartData$ | async"  [title]="t('yearlyColumnChartTitle')" [errorMessage]="t('expensesError')"></app-chart>

            <app-drop-menu class="year" [description]="'Year'" [currentValue]="selectedYear$ | async"
                [valueList]="availableYears$ |async" (valueChanged)="changeYear($event)" (menuOpened)="openDropMenu = 'filter-year'" (menuClosed)="openDropMenu = null" [menuOpen]="openDropMenu === 'filter-year'"></app-drop-menu>

            <app-interactive-table-chart
                [allMonthCategoryData]="categoryDataOfSelectedYearGroupedByMonth$ | async" ></app-interactive-table-chart>

            <div class="drop-menu-row">
                <app-drop-menu class="pie-chart-drop-down-start-month" [description]="t('filterFrom')"
                    [translateMonth]="true" [currentValue]="filterStartMonth$ | async"
                    [valueList]="availableMonths$ | async"
                    (valueChanged)="changePieChartSelectedStartMonth($event)"
                    (menuOpened)="openDropMenu = 'filter-start-month'" (menuClosed)="openDropMenu = null" [menuOpen]="openDropMenu === 'filter-start-month'"></app-drop-menu>

                <app-drop-menu class="pie-chart-drop-down-end-month" [description]="t('filterTo')" [translateMonth]="true"
                    [currentValue]="filterEndMonth$ | async" [valueList]="availableMonths$ | async"
                    (valueChanged)="changePieChartSelectedEndMonth($event)"
                    (menuOpened)="openDropMenu = 'filter-end-month'" (menuClosed)="openDropMenu = null" [menuOpen]="openDropMenu === 'filter-end-month'"></app-drop-menu>
            </div>



            <app-chart [chartOptions]="labelSharePrice$ |async"
                [errorMessage]="t('labelShareError')" [title]="t('labelShareChartTitle')"></app-chart>
            <app-chart [chartOptions]="labelShareCount$ |async"
                [errorMessage]="t('totalLabelShareError')" [title]="t('totalLabelShareChartTitle')"></app-chart>


            <app-chart [chartOptions]="topExpenses$ |async" [errorMessage]="t('incomesError')"></app-chart>

            <app-chart class="incomes" [chartOptions]="topIncomes$ |async"
                [errorMessage]="t('expensesError')"></app-chart>
        </div>

        <div *ngIf="showNoTransactionsError" class="error-message">
            <span>{{t('noTransactions')}}</span>
            <span>{{t('addTransactions')}}</span>
        </div>

        <div *ngIf="showNoLabelsError" class="error-message">
            <span>{{t('noLabels')}}</span>
            <span>{{t('addLabels')}}</span>
        </div>

        <div class="error-message" *ngIf="showLoadingError">
            <span>{{t('errorOccured')}}</span>
            <span> {{t('refreshPls')}}</span>
            <button (click)="refreshPage()">{{t('refresh')}}</button>
        </div>
    </div>

    <div class="spinner" *ngIf="(showSpinner$ | async) === true"><app-spinner [color]="'white'"></app-spinner></div>
</div>
